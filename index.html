<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Gyaan Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #001a12, #003d2b, #00664d);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: gold;
}

.question-box {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.option {
    display: block;
    background: #00a86b;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
}

.option:hover {
    background: #00cc88;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    color: gold;
}

.next-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: gold;
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Gyaan Game</h1>

    <div class="question-box">
        <h2 id="question">Loading...</h2>

        <div id="options"></div>

        <div class="result" id="result"></div>

        <button class="next-btn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<script>
let questions = [
    {
        question: "जीवन में सबसे बड़ा डर क्या है?",
        options: ["असफलता", "लोग क्या कहेंगे", "अकेलापन"],
        answers: [
            "डर केवल मन की कल्पना है, सत्य नहीं।",
            "लोगों की सोच बदलती रहती है, खुद पर ध्यान दो।",
            "अकेलापन आत्मा से जुड़ने का अवसर है।"
        ]
    },
    {
        question: "सच्ची खुशी कहाँ है?",
        options: ["पैसे में", "रिश्तों में", "अपने अंदर"],
        answers: [
            "पैसा सुविधा देता है, खुशी नहीं।",
            "रिश्ते महत्वपूर्ण हैं, पर असली खुशी भीतर है।",
            "सही! असली आनंद भीतर ही है।"
        ]
    },
    {
        question: "मन को शांत कैसे करें?",
        options: ["भाग कर", "सोच बदलकर", "ध्यान से"],
        answers: [
            "भागने से मन और तेज भागेगा।",
            "सोच बदलना पहला कदम है।",
            "ध्यान मन को स्थिर करता है।"
        ]
    }
];

let current = 0;

function loadQuestion() {
    document.getElementById("result").innerHTML = "";
    let q = questions[current];

    document.getElementById("question").innerText = q.question;

    let optionsHTML = "";
    q.options.forEach((opt, index) => {
        optionsHTML += `<div class="option" onclick="selectOption(${index})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;
}

function selectOption(index) {
    let answer = questions[current].answers[index];
    document.getElementById("result").innerText = answer;
}

function nextQuestion() {
    current++;
    if (current >= questions.length) {
        document.getElementById("question").innerText = "🎉 आपने आज का ज्ञान पूरा कर लिया!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("result").innerText = "आप अपने जीवन को समझने की दिशा में बढ़ रहे हैं।";
        return;
    }
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
