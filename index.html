<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyan ka Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f9b0f, #00c9a7, #a8ff78);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: #ffffff;
    color: #0f9b0f;
    font-weight: bold;
}

.option {
    display: block;
    background: white;
    color: black;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    background: #d4ffd4;
}

.correct {
    background: #4caf50 !important;
    color: white;
}

.wrong {
    background: #ff4d4d !important;
    color: white;
}

#resultBox {
    margin-top: 15px;
    font-size: 16px;
}

.progress {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎮 Gyan ka Game</h1>

<div id="startScreen" class="card">
    <p>आज के 5 प्रश्न खेलें और अपना ज्ञान बढ़ाएं</p>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" class="card" style="display:none;">
    <div id="question"></div>
    <div id="options"></div>

    <div id="resultBox"></div>
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next</button>

    <div class="progress" id="progress"></div>
</div>

<div id="resultScreen" class="card" style="display:none;">
    <h2>आपका स्कोर: <span id="score"></span>/5</h2>
    <p id="finalMsg"></p>
    <button onclick="restartGame()">फिर से खेलें</button>
</div>

</div>

<script>

const questions = [
{
    q: "मन अशांत क्यों होता है?",
    options: ["अपेक्षा", "शांति", "ज्ञान", "धैर्य"],
    answer: "अपेक्षा",
    gyan: "जहाँ अपेक्षा अधिक, वहाँ अशांति निश्चित।"
},
{
    q: "सच्ची शक्ति क्या है?",
    options: ["पैसा", "गुस्सा", "संयम", "शरीर"],
    answer: "संयम",
    gyan: "जो खुद को जीत ले, वही सबसे शक्तिशाली।"
},
{
    q: "खुशी कहाँ मिलती है?",
    options: ["बाहर", "दूसरों में", "अपने भीतर", "पैसे में"],
    answer: "अपने भीतर",
    gyan: "खुशी बाहर नहीं, अनुभव के भीतर है।"
},
{
    q: "जीवन का उद्देश्य क्या है?",
    options: ["कमाना", "सीखना", "जागना", "सोना"],
    answer: "जागना",
    gyan: "जीवन का असली लक्ष्य चेतना का जागरण है।"
},
{
    q: "क्रोध को कैसे जीतें?",
    options: ["चिल्लाकर", "शांत रहकर", "भागकर", "दबाकर"],
    answer: "शांत रहकर",
    gyan: "शांति ही क्रोध का अंत है।"
}
];

let current = 0;
let score = 0;
let answered = false;

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    showQuestion();
}

function showQuestion() {
    answered = false;
    document.getElementById("resultBox").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";

    let q = questions[current];
    document.getElementById("question").innerHTML = "<h3>" + q.q + "</h3>";

    let optionsHtml = "";
    q.options.forEach(opt => {
        optionsHtml += `<div class="option" onclick="checkAnswer(this, '${opt}')">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHtml;
    document.getElementById("progress").innerText = `Question ${current+1}/5`;
}

function checkAnswer(el, selected) {
    if(answered) return;
    answered = true;

    let correct = questions[current].answer;
    let gyan = questions[current].gyan;

    let options = document.querySelectorAll(".option");

    options.forEach(opt => {
        if(opt.innerText === correct){
            opt.classList.add("correct");
        }
        if(opt.innerText === selected && selected !== correct){
            opt.classList.add("wrong");
        }
    });

    if(selected === correct){
        score++;
        document.getElementById("resultBox").innerHTML = "✔ सही!<br>" + gyan;
    } else {
        document.getElementById("resultBox").innerHTML = "❌ गलत!<br>" + gyan;
    }

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
    current++;
    if(current < questions.length){
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";
    document.getElementById("score").innerText = score;

    let msg = "";
    if(score == 5) msg = "🔥 आप जागरूक हैं!";
    else if(score >=3) msg = "✨ आप सही दिशा में हैं";
    else msg = "🌱 सीख की शुरुआत हुई है";

    document.getElementById("finalMsg").innerText = msg;
}

function restartGame(){
    current = 0;
    score = 0;
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "block";
}

</script>

</body>
</html>
