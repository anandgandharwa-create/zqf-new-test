<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Gyan Game</title>

<style>

/* 🌌 COSMIC BACKGROUND */
body{
margin:0;
font-family:system-ui;
color:#fff;
text-align:center;
overflow:hidden;

background: radial-gradient(circle at 30% 30%, #0f2a3a, #020b14);
}

/* ✨ STARS */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px, 80px 80px;
opacity:0.15;
animation:starsMove 60s linear infinite;
}

@keyframes starsMove{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

/* 🔮 TOP BAR */
.gameTop{
display:flex;
justify-content:space-between;
padding:14px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
font-weight:600;
}

/* 💎 QUESTION CARD */
.questionCard{
margin:25px 20px;
padding:24px;
border-radius:18px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

box-shadow:
0 0 20px rgba(0,150,255,0.3),
inset 0 0 10px rgba(255,255,255,0.1);

font-size:18px;
line-height:1.6;
}

/* ⚡ OPTIONS */
.optionBtn{
margin:12px 20px;
padding:16px;
border-radius:14px;

background:linear-gradient(145deg,#102a3a,#071b26);

box-shadow:0 0 10px rgba(0,150,255,0.2);

cursor:pointer;
transition:0.3s;
}

.optionBtn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(0,200,255,0.6);
}

/* ✅ CORRECT */
.correct{
background:linear-gradient(145deg,#0f5c3a,#05291a) !important;
box-shadow:0 0 20px #00ff9c;
}

/* ❌ WRONG */
.wrong{
background:linear-gradient(145deg,#5c0f1f,#2a050c) !important;
box-shadow:0 0 20px #ff4d6d;
}

/* 🌟 RESULT */
#result{
margin-top:12px;
color:#ffd700;
font-size:16px;
}

/* 🚀 BUTTON */
.nextBtn{
margin:20px;
padding:14px;
border-radius:14px;

background:linear-gradient(45deg,#ffd700,#ffb300);
color:#000;
font-weight:600;

cursor:pointer;
transition:0.3s;
}

.nextBtn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,215,0,0.8);
}

/* ⏳ TIMER PULSE */
#timer{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.5;}
100%{opacity:1;}
}

</style>
</head>

<body>

<div class="gameTop">
  <div id="score">🔥 0</div>
  <div id="timer">⏳ 10</div>
  <div id="streak">⚡ 0</div>
</div>

<div class="questionCard" id="question"></div>

<div id="options"></div>

<div id="result"></div>

<div class="nextBtn" onclick="nextQ()">अगला प्रश्न →</div>

<script>

let score=0, streak=0, current=0, time=10, timer;

const questions=[
{
q:"आप कौन हैं?",
options:["शरीर","मन","साक्षी"],
answer:2,
insight:"आप साक्षी हैं — देखने वाले"
},
{
q:"शांति कब मिलती है?",
options:["जब सब सही हो","जब मन शांत हो","जब भागो"],
answer:1,
insight:"मन शांत = शांति"
},
{
q:"विचार क्या हैं?",
options:["आप हैं","आते-जाते हैं","स्थायी हैं"],
answer:1,
insight:"विचार आते-जाते हैं"
}
];

function loadQ(){
clearInterval(timer);
time=10;
startTimer();

const q=questions[current];
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((opt,i)=>{
html+=`<div class="optionBtn" onclick="check(${i},this)">${opt}</div>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

function check(i,el){
const q=questions[current];
const all=document.querySelectorAll(".optionBtn");

all.forEach(btn=>btn.style.pointerEvents="none");

if(i===q.answer){
el.classList.add("correct");
score+=10;
streak++;
document.getElementById("result").innerText="✨ "+q.insight;
}else{
el.classList.add("wrong");
all[q.answer].classList.add("correct");
streak=0;
document.getElementById("result").innerText="🧠 "+q.insight;
}

update();
}

function nextQ(){
current++;
if(current>=questions.length) current=0;
loadQ();
}

function update(){
document.getElementById("score").innerText="🔥 "+score;
document.getElementById("streak").innerText="⚡ "+streak;
}

function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time;

if(time===0){
clearInterval(timer);
streak=0;
update();
alert("⏳ समय समाप्त");
}
},1000);
}

loadQ();

</script>

</body>
</html>
