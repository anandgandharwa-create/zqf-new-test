<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Divine Prediction Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #000428, #004e92);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: gold;
}

.question-box {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.option {
    display: block;
    background: #1e90ff;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
}

.option:hover {
    background: #63b3ff;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    color: gold;
}

.next-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: gold;
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔮 Divine Prediction</h1>

    <div class="question-box">
        <h2 id="question"></h2>
        <div id="options"></div>
        <div class="result" id="result"></div>
        <button class="next-btn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<script>
let questions = [
    {
        question: "आप अभी जीवन में क्या खोज रहे हैं?",
        options: ["शांति", "सफलता", "प्रेम"]
    },
    {
        question: "आपको सबसे ज्यादा क्या रोकता है?",
        options: ["डर", "आलस", "लोगों की सोच"]
    },
    {
        question: "आपका दिल अभी क्या चाहता है?",
        options: ["आराम", "बदलाव", "कुछ बड़ा"]
    }
];

let answersChosen = [];
let current = 0;

function loadQuestion() {
    document.getElementById("result").innerHTML = "";

    let q = questions[current];
    document.getElementById("question").innerText = q.question;

    let optionsHTML = "";
    q.options.forEach((opt) => {
        optionsHTML += `<div class="option" onclick="selectOption('${opt}')">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;
}

function selectOption(option) {
    answersChosen.push(option);
    document.getElementById("result").innerText = "✔ चयन किया गया";
}

function nextQuestion() {
    current++;

    if (current >= questions.length) {
        showPrediction();
        return;
    }

    loadQuestion();
}

function showPrediction() {
    let message = "";

    if (answersChosen.includes("डर")) {
        message = "🔮 ब्रह्मांड का संकेत: आपका डर ही आपकी सबसे बड़ी शक्ति बनने वाला है। उसे स्वीकार करें।";
    } 
    else if (answersChosen.includes("सफलता")) {
        message = "🔮 संकेत: आने वाले समय में आपके लिए बड़ा अवसर तैयार है। तैयार रहिए।";
    } 
    else {
        message = "🔮 संकेत: आपका जीवन एक नए मोड़ पर है। खुद पर भरोसा रखें।";
    }

    document.getElementById("question").innerText = "✨ आपका Divine Message";
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = message;
}

loadQuestion();
</script>

</body>
</html>
