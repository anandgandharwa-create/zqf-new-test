<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Quantum Frequency</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #000814, #001d3d);
    color: white;
    text-align: center;
}

/* Header */
.header {
    padding: 15px;
    background: #4b1d6b;
}

/* Screens */
.screen {
    display: none;
    padding: 20px;
}
.active {
    display: block;
}

/* Text */
.gyan {
    font-size: 20px;
    margin: 30px 0;
}

.highlight {
    color: #ffd700;
}

/* Buttons */
.btn {
    padding: 14px;
    margin: 10px;
    width: 85%;
    border-radius: 30px;
    border: none;
    font-size: 15px;
}

.green {
    background: #00c853;
    color: black;
}

.yellow {
    background: #ffd600;
    color: black;
}

.outline {
    border: 1px solid #ffd700;
    background: transparent;
    color: #ffd700;
}

/* Question */
.q {
    margin: 20px 0;
}

.footer {
    font-size: 12px;
    opacity: 0.5;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">Zero Quantum Frequency™</div>

<!-- 🟢 HOME -->
<div id="home" class="screen active">

<div class="gyan">
⚡ “मन ही कारण है  
<span class="highlight">बंधन</span> का भी…  
और <span class="highlight">मुक्ति</span> का भी”
</div>

<button class="btn green" onclick="show('gyanPage')">
🧿 गीता ज्ञान
</button>

<button class="btn outline" onclick="show('activity')">
⚡ Activity शुरू करें
</button>

</div>

<!-- 🧿 GEETA PAGE -->
<div id="gyanPage" class="screen">

<h3>आज का गीता ज्ञान</h3>

<p>
“आप अपने विचार नहीं हैं…  
आप उनके साक्षी हैं”
</p>

<button class="btn yellow" onclick="show('home')">🔙 वापस</button>

</div>

<!-- ⚡ ACTIVITY MENU -->
<div id="activity" class="screen">

<h3>Activity</h3>

<button class="btn green" onclick="show('quiz')">
🧠 Geeta Quiz
</button>

<button class="btn yellow" onclick="show('test')">
🌌 Subconscious Test
</button>

<button class="btn outline" onclick="show('home')">🔙 वापस</button>

</div>

<!-- 🧠 QUIZ -->
<div id="quiz" class="screen">

<h3>Quiz</h3>

<div class="q">
मनुष्य का शत्रु कौन है?<br>
<button onclick="answerQuiz(false)">दुनिया</button><br>
<button onclick="answerQuiz(true)">मन</button><br>
<button onclick="answerQuiz(false)">भाग्य</button>
</div>

<button class="btn yellow" onclick="show('test')">Next</button>

</div>

<!-- 🌌 TEST -->
<div id="test" class="screen">

<h3>Subconscious Test</h3>

<div class="q">
पैसा सोचते समय feeling?<br>
<button onclick="answerBelief('positive')">😌</button>
<button onclick="answerBelief('neutral')">😐</button>
<button onclick="answerBelief('negative')">😟</button>
</div>

<button class="btn green" onclick="showResult()">Result</button>

</div>

<!-- 🔥 RESULT -->
<div id="result" class="screen">

<h3>आपका Result</h3>

<p id="resultText"></p>

<button class="btn outline" onclick="resetApp()">🔄 Restart</button>

</div>

<div class="footer">आप एक Frequency हैं</div>

<script>

let quizScore = 0;
let beliefScore = 0;

function show(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function answerQuiz(correct){
    if(correct) quizScore++;
}

function answerBelief(type){
    if(type === "positive") beliefScore += 2;
    if(type === "neutral") beliefScore += 1;
}

function showResult(){

    let msg = "";

    if(quizScore >= 1 && beliefScore < 2){
        msg = "आप जानते हैं... लेकिन मानते नहीं";
    }
    else if(quizScore < 1 && beliefScore >= 2){
        msg = "आप मानते हैं... लेकिन स्पष्ट ज्ञान नहीं";
    }
    else if(quizScore >= 1 && beliefScore >= 2){
        msg = "आप alignment में हैं 🔥";
    }
    else{
        msg = "आपको दोनों पर काम करना है";
    }

    document.getElementById("resultText").innerText = msg;

    show('result');
}

function resetApp(){
    quizScore = 0;
    beliefScore = 0;
    show('home');
}

</script>

</body>
</html>
