<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Quantum Frequency</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#000,#021414);
color:#fff;
text-align:center;
}

/* Container */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* Card */
.card{
background:#0b1c1c;
padding:20px;
border-radius:15px;
margin-top:20px;
}

/* Premium Bar */
.premiumBox{
margin:15px 0;
padding:12px;
border-radius:12px;
background:linear-gradient(135deg,#f5d06f,#caa84c);
color:#000;
font-weight:bold;
cursor:pointer;
}

/* Button */
.btn{
background:#f5d06f;
color:#000;
padding:14px;
border-radius:25px;
margin-top:15px;
cursor:pointer;
font-size:16px;
}

/* Quote */
.quote{
margin-top:10px;
line-height:1.6;
color:#d6e2ff;
}
</style>
</head>

<body>

<div class="container">

<h2>Zero Quantum Frequency™</h2>

<div class="card">

<!-- Premium -->
<div class="premiumBox" onclick="goPremium()" id="premiumBtn">
Loading...
</div>

<!-- Quote -->
<div class="quote">
“जो स्वयं को जान लेता है उसे संसार पर विजय की आवश्यकता नहीं रहती।”
</div>

<!-- Tools Button -->
<div class="btn" onclick="openTools()">
🧠 10 Powerful Tools
</div>
<div class="btn" onclick="localStorage.setItem('premium','yes')">
Activate Premium (Test)
</div>
</div>

</div>

<script>

/* Open Premium Page */
function openPremium(){
window.location.href = "premium.html";
}

/* Open Tools Folder */
function openTools(){

if(!localStorage.getItem("premium")){
alert("यह Premium Feature है");
window.location.href = "premium.html";
return;
}

window.location.href = "premium/tools.html";
}
<script>
let btn = document.getElementById("premiumBtn");

if(localStorage.getItem("premium") === "yes"){
    btn.innerHTML = "✨ Premium Activated – Open Tools";
}
else{
    btn.innerHTML = "🔒 Unlock Premium – ₹199 (10 Tools)";
}
</script>

</body>
</html>
