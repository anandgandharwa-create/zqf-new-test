<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Prediction Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #000428, #004e92);
    color: white;
    text-align: center;
}
.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

/* Heading */
h1 {
    color: gold;
    font-size: 22px;
}
    .question-box {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
}
    /* 📱 Extra small screens */
@media (max-width: 400px) {
    h1 {
        font-size: 18px;
    }
    #question {
        font-size: 16px;
    }
    .option {
        font-size: 14px;
        padding: 12px;
    }
}

/* Question text */
#question {
    font-size: 18px;
    line-height: 1.4;
}

.option {
    display: block;
    background: #1e90ff;
    margin: 8px 0;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
}

/* Selected */
.option.selected {
    background: gold;
    color: black;
    font-weight: bold;
}

.next-btn, #restartBtn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    font-size: 16px;
    background: gold;   /* 👈 yellow */
    color: black;
    border: none;
    cursor: pointer;
}

/* Result text */
.result {
    margin-top: 15px;
    font-size: 16px;
    color: gold;
}
   #restartBtn {
    margin-top: 30px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔮 Divine Prediction</h1>

    <div class="question-box">
        <h2 id="question"></h2>
        <div id="options"></div>
        <div class="result" id="result"></div>
        <button id="nextBtn" class="next-btn" onclick="nextQuestion()" style="display:none;">
➡️ Next
</button>
    <button id="restartBtn" onclick="restartGame()" style="display:none; margin-top:20px;">
🔁 फिर से शुरू करें
</button>
    </div>
</div>

<script>
let questions = [
    {
        question: "आप अभी जीवन में क्या खोज रहे हैं?",
        options: ["शांति", "सफलता", "प्रेम"]
    },
    {
        question: "आपको सबसे ज्यादा क्या रोकता है?",
        options: ["डर", "आलस", "लोगों की सोच"]
    },
    {
        question: "आपका दिल अभी क्या चाहता है?",
        options: ["आराम", "बदलाव", "कुछ बड़ा"]
    }
];

let answersChosen = [];
let current = 0;
let selected = null;

function loadQuestion() {
    document.getElementById("result").innerHTML = "";

    let q = questions[current];
    document.getElementById("question").innerText = q.question;

    let optionsHTML = "";
    q.options.forEach((opt) => {
       optionsHTML += `<div class="option" onclick="selectOption('${opt}', this)">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;
    document.getElementById("nextBtn").style.display = "none";
}

function selectOption(option, element) {

    selected = option; // save selected answer

    let allOptions = document.querySelectorAll(".option");
    allOptions.forEach(opt => opt.classList.remove("selected"));

    element.classList.add("selected");

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {

    if (!selected) {
        alert("⚠️ पहले एक विकल्प चुनिए");
        return;
    }

    answersChosen.push(selected);
    selected = null;

    current++;

    if (current >= questions.length) {
        showPrediction();
        return;
    }

    loadQuestion();
}

function showPrediction() {
    let message = "";

    if (answersChosen.includes("डर")) {
        message = "🔮 ब्रह्मांड का संकेत: आपका डर ही आपकी सबसे बड़ी शक्ति बनने वाला है। उसे स्वीकार करें।";
    } 
    else if (answersChosen.includes("सफलता")) {
        message = "🔮 संकेत: आने वाले समय में आपके लिए बड़ा अवसर तैयार है। तैयार रहिए।";
    } 
    else {
        message = "🔮 संकेत: आपका जीवन एक नए मोड़ पर है। खुद पर भरोसा रखें।";
    }

    document.getElementById("question").innerText = "✨ आपका Divine Message";
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = message;
    document.getElementById("restartBtn").style.display = "inline-block";
    document.getElementById("nextBtn").style.display = "none";
}

loadQuestion();
    function restartGame() {
    current = 0;
    answersChosen = [];
    loadQuestion();
        selected = null;
        document.getElementById("restartBtn").style.display = "none";
}
</script>

</body>
</html>
