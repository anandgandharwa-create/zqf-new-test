<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Quantum Frequency</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #000814, #001d3d);
    color: white;
    text-align: center;
}

/* Header */
.header {
    padding: 16px;
    font-size: 18px;
    background: #4b1d6b;
}

/* Center Container */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 85vh;
    padding: 20px;
}

/* Geeta Line */
.gyan {
    font-size: 20px;
    line-height: 1.6;
    margin-bottom: 40px;
}

.highlight {
    color: #ffd700;
}

/* Buttons */
.btn {
    padding: 16px;
    margin: 12px auto;
    width: 85%;
    border-radius: 40px;
    font-size: 16px;
    border: none;
    cursor: pointer;
}

/* Geeta Button */
.gyan-btn {
    background: linear-gradient(45deg, #00c853, #69f0ae);
    color: black;
    font-weight: bold;
}

/* Activity Button */
.act-btn {
    background: transparent;
    border: 1px solid #ffd700;
    color: #ffd700;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    font-size: 12px;
    opacity: 0.5;
}
</style>

</head>

<body>

<div class="header">Zero Quantum Frequency™</div>

<div class="container">

<!-- 🔮 SINGLE GEETA LINE -->
<div class="gyan">
⚡ “मन ही कारण है  
<span class="highlight">बंधन</span> का भी…  
और <span class="highlight">मुक्ति</span> का भी”
</div>

<!-- 🟢 BUTTON 1 -->
<button class="btn gyan-btn">
🧿 आज का गीता ज्ञान
</button>

<!-- 🟡 BUTTON 2 -->
<button class="btn act-btn">
⚡ आज की Activity शुरू करें
</button>

</div>

<div class="footer">
आप एक Frequency हैं
</div>

</body>
</html>
