<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zero Quantum Frequency</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#000000,#021414);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* Card */
.container{
width:90%;
max-width:400px;
}

/* Title */
.title{
font-size:26px;
margin-bottom:20px;
color:#f5d06f;
}

/* Button */
.button{
background:#f5d06f;
color:#000;
padding:15px;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

/* Result Box */
.result{
margin-top:20px;
font-size:18px;
min-height:60px;
}

/* Premium Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:25px;
border-radius:15px;
width:80%;
text-align:center;
}

.unlock{
background:#f5d06f;
padding:12px;
border-radius:25px;
margin-top:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="title">आज का संकेत</div>

<div class="button" onclick="showMessage()">
Tap to Reveal
</div>

<div class="result" id="result"></div>

</div>

<!-- Premium Popup -->
<div class="popup" id="popup">
<div class="popup-content">

<h3>🔒 Premium Unlock</h3>

<p>आपका अगला संकेत Premium में unlock होगा</p>
<p>₹99/month (₹3/day)</p>

<div class="unlock" onclick="unlockPremium()">
Unlock Now
</div>

</div>
</div>

<script>

let messages = [
"आज निर्णय लेने का सही समय है",
"जो रुका है, उसे आगे बढ़ाओ",
"आपकी ऊर्जा आकर्षण में है",
"आज शांत रहना ही शक्ति है",
"कोई नया अवसर आने वाला है"
];

// free limit
let freeLimit = 2;

// load count
let count = localStorage.getItem("useCount") || 0;

function showMessage(){

if(count >= freeLimit){
document.getElementById("popup").style.display="flex";
return;
}

// random message
let msg = messages[Math.floor(Math.random()*messages.length)];

document.getElementById("result").innerText = msg;

// increase count
count++;
localStorage.setItem("useCount",count);

}

// unlock button (demo)
function unlockPremium(){
alert("Payment integration yahan add karo");
}

</script>

</body>
</html>
