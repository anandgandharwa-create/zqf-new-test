<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#071826;
color:#fff;
text-align:center;
}

/* Container */
.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* Title */
.title{
font-size:22px;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
color:#a3bcd9;
margin-bottom:20px;
}

/* Card */
.card{
background:#0f2233;
border-radius:18px;
padding:20px;
margin-top:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-3px);
}

/* Icon */
.icon{
font-size:28px;
margin-bottom:10px;
}

/* Heading */
.heading{
font-size:18px;
margin-bottom:6px;
}

/* Text */
.text{
font-size:14px;
color:#b8d4f0;
line-height:1.5;
}

/* CTA */
.cta{
margin-top:10px;
font-size:13px;
color:#ffd700;
}

/* Back */
.back{
margin-top:25px;
padding:12px;
background:#333;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="title">💎 Premium Access</div>
<div class="subtitle">Inner Transformation System</div>

<!-- 🔮 Ask Krishna -->
<div class="card" onclick="openKrishna()">
<div class="icon">🔮</div>
<div class="heading">Ask Krishna</div>
<div class="text">
अपने प्रश्न का उत्तर भीतर से प्राप्त करें
</div>
<div class="cta">Tap to Receive Guidance</div>
</div>

<!-- 🧘 Meditation -->
<div class="card" onclick="openMeditation()">
<div class="icon">🧘</div>
<div class="heading">Daily Meditation</div>
<div class="text">
मन को शांत करें और ऊर्जा को संतुलित करें
</div>
<div class="cta">Play Now</div>
</div>

<!-- 🎥 Course -->
<div class="card" onclick="openCourse()">
<div class="icon">🎥</div>
<div class="heading">Transformation Course</div>
<div class="text">
वीडियो कोर्स + Gratitude अभ्यास
</div>
<div class="cta">Start Your Journey</div>
</div>

<!-- Back -->
<div class="back" onclick="goBack()">← Back</div>

</div>

<script>

/* 🔒 Premium Check */
if(localStorage.getItem("premium") !== "yes"){
    alert("यह Premium Feature है");
    window.location.href = "../pages/premium.html";
}

/* Navigation */
function openKrishna(){
    window.location.href = "../pages/krishna-api.html";
}

function openMeditation(){
    window.location.href = "../pages/meditation.html";
}

function openCourse(){
    window.location.href = "../pages/course.html";
}

function goBack(){
    window.location.href = "../index.html";
}

</script>

</body>
</html>
