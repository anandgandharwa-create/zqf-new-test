<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📿 गीता ज्ञान Quiz</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #000000);
    color: white;
    text-align: center;
}
.container::before {
    content: "🦚";
    font-size: 60px;
    position: absolute;
    left: 20px;
    top: 10px;
    opacity: 0.2;
}

.container {
    position: relative;
}
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: gold;
    text-shadow: 0 0 10px gold;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 14px;
    color: #ffcc00;
}

/* Card */
.card {
    background: rgba(0, 50, 120, 0.2);
    border: 1px solid rgba(0, 200, 255, 0.4);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.3);
}
/* Question */
#question {
    margin-bottom: 15px;
    font-size: 18px;
}

/* Options */
.option {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    padding: 12px;
    margin: 8px 0;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.option:hover {
    transform: scale(1.05);
}

.option.correct {
    background: #00e676;
}

.option.wrong {
    background: red;
    color: white;
}

/* Button */
.next-btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c853, #00e676);
    color: black;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 15px;
    color: gold;
    font-size: 18px;
}

/* Animation */
.fade {
    animation: fade 0.5s ease-in-out;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<h1>📿 गीता ज्ञान Quiz</h1>

<div class="top-bar">
    <div>⭐ Marks: <span id="score">0</span></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
    <div>🏆 Level: <span id="level">1</span></div>
</div>

<div class="card fade">

<div id="question"></div>
<div id="options"></div>

<button class="next-btn" onclick="nextQuestion()" style="display:none;">
🚀 आगे बढ़ें
</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

let questions = [
{
q: "गीता में अर्जुन के सारथी कौन थे?",
o: ["शिव", "कृष्ण", "इंद्र", "ब्रह्मा"],
a: "कृष्ण"
},
{
q: "कर्म करने का अधिकार किस पर है?",
o: ["फल पर", "कर्म पर", "दूसरों पर", "भाग्य पर"],
a: "कर्म पर"
},
{
q: "गीता किस ग्रंथ का हिस्सा है?",
o: ["रामायण", "महाभारत", "वेद", "पुराण"],
a: "महाभारत"
},
{
q: "गीता का मुख्य संदेश क्या है?",
o: ["त्याग", "भक्ति", "कर्म", "सभी"],
a: "सभी"
},
{
q: "योग का अर्थ क्या है?",
o: ["भागना", "जुड़ना", "सोना", "लड़ना"],
a: "जुड़ना"
},
{
q: "अहंकार क्या करता है?",
o: ["उन्नति", "विनाश", "शांति", "सुख"],
a: "विनाश"
},
{
q: "गीता में शांति कैसे मिलती है?",
o: ["धन से", "त्याग से", "भक्ति से", "दोनों"],
a: "दोनों"
},
{
q: "मन को कैसे जीतें?",
o: ["बल से", "ज्ञान से", "क्रोध से", "डर से"],
a: "ज्ञान से"
},
{
q: "धर्म क्या है?",
o: ["कर्तव्य", "धन", "सुख", "युद्ध"],
a: "कर्तव्य"
},
{
q: "कौन सा गुण श्रेष्ठ है?",
o: ["क्रोध", "लोभ", "सत्त्व", "मोह"],
a: "सत्त्व"
},
{
q: "गीता में सफलता का मार्ग क्या है?",
o: ["भाग्य", "कर्म", "डर", "लालच"],
a: "कर्म"
}
];

let current = 0;
let score = 0;
let streak = 0;
let level = 1;
let selected = null;
let bestStreak = 0;

function loadQuestion(){
    let q = questions[current];

    document.getElementById("question").innerText = (current+1) + ". " + q.q;

    let html = "";
    q.o.forEach(opt=>{
        html += `<div class="option" onclick="selectOption('${opt}', this)">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = html;
    document.querySelector(".next-btn").style.display = "none";
    selected = null;
}

function selectOption(opt, el){

    if(selected) return;

    selected = opt;
    let correct = questions[current].a;

    document.querySelectorAll(".option").forEach(o=>{
        o.style.pointerEvents = "none";

        if(o.innerText === correct){
            o.classList.add("correct");
        }

        if(o.innerText === opt && opt !== correct){
            o.classList.add("wrong");
        }
    });

    if(opt === correct){
        score += 10;
        streak++;

        if(streak > bestStreak){
            bestStreak = streak;
        }

    } else {
        streak = 0;
    }

    level = Math.floor(score / 30) + 1;

    updateTop();

    document.querySelector(".next-btn").style.display = "block";
}
function nextQuestion(){

    current++;

    if(current >= questions.length){
        showResult();
        return;
    }

    loadQuestion();
}

function updateTop(){
    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;
    document.getElementById("level").innerText = level;
}

function showResult(){

    document.getElementById("question").innerText = "✨ आपका परिणाम";
    document.getElementById("options").innerHTML = "";

    let msg = "";

    if(score >= 80){
        msg = "🌟 अद्भुत! आप गीता के गहरे जानकार हैं।";
    } else if(score >= 50){
        msg = "👍 अच्छा! आप सही दिशा में हैं।";
    } else {
        msg = "📿 शुरुआत शानदार है… सीखते रहें।";
    }

    document.getElementById("result").innerHTML = `
${msg}
<br><br>⭐ कुल अंक: ${score}
<br>🔥 Best Streak: ${bestStreak}
<br>🏆 Level: ${level}
`;

    document.querySelector(".next-btn").style.display = "none";
}

loadQuestion();

</script>

</body>
</html>
