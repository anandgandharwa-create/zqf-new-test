<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mind Calm Calculator</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#000000,#021414);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
width:90%;
max-width:400px;
background:#0b1c1c;
padding:25px;
border-radius:15px;
}

.title{
font-size:22px;
color:#f5d06f;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:25px;
background:#f5d06f;
color:#000;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:16px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Mind Calm Calculator</div>

<input type="number" id="stress" placeholder="Stress level (1–10)">

<button onclick="calculateCalm()">Calm Now</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateCalm(){

let stress = document.getElementById("stress").value;

if(!stress){
alert("Please enter stress level");
return;
}

let output = "";

if(stress <= 3){
output = "आप पहले से ही शांत अवस्था में हैं। बस अपनी सांस पर ध्यान बनाए रखें।";
}
else if(stress <= 6){
output = "4 सेकंड सांस लें, 4 सेकंड रोकें, 4 सेकंड छोड़ें। इसे 5 बार करें। मन शांत होगा।";
}
else{
output = "आंखें बंद करें। 6 सेकंड गहरी सांस लें, 6 सेकंड छोड़ें। 2 मिनट तक करें। आप तुरंत हल्का महसूस करेंगे।";
}

document.getElementById("result").innerText = output;

}

</script>

</body>
</html>
