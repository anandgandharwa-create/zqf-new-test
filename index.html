<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geeta Learning Experience</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1a1a1a,#000000);
    color:white;
    padding-bottom:80px;
}

/* HEADER */
.header{
    text-align:center;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(45deg,#FFD700,#FFA500);
    color:black;
    position:sticky;
    top:0;
    z-index:10;
}

/* CARD */
.card{
    margin:12px;
    padding:16px;
    border-radius:14px;
    background:rgba(255,215,0,0.08);
    backdrop-filter:blur(10px);
    box-shadow:0 0 12px rgba(255,215,0,0.2);
}

/* SHLOK */
.shlok{
    font-size:17px;
    color:#FFD700;
    text-align:center;
    font-weight:bold;
}

/* TEXT */
p{
    font-size:14px;
    line-height:1.5;
}

/* OPTION */
.option{
    background:rgba(255,255,255,0.05);
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

.option:hover{
    background:#FFD700;
    color:black;
    transform:scale(1.02);
}

/* RESULT */
.result{
    text-align:center;
    font-size:16px;
    margin-top:10px;
    color:#00FFAA;
}

/* BUTTON */
.btn{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:85%;
    padding:14px;
    border-radius:30px;
    border:none;
    background:linear-gradient(45deg,#FFD700,#FFA500);
    color:black;
    font-weight:bold;
    font-size:16px;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="header">🕉 Geeta Learning Game</div>

<div class="card">
    <div class="shlok" id="shlok"></div>
    <p id="meaning"></p>
</div>

<div class="card">
    <h3>🧠 प्रश्न</h3>
    <div id="question"></div>
    <div id="options"></div>
    <div class="result" id="result"></div>
</div>

<div class="card">
    <h3>✨ आज का चिंतन</h3>
    <p id="reflection"></p>
</div>

<button class="btn" onclick="next()">👉 अगला ज्ञान</button>

<script>

let data = [
{
shlok:"कर्मण्येवाधिकारस्ते मा फलेषु कदाचन",
meaning:"तुम्हारा अधिकार केवल कर्म करने में है, फल में नहीं।",
question:"गीता क्या सिखाती है?",
options:["फल पर ध्यान दो","कर्म पर ध्यान दो","कुछ मत करो"],
answer:1,
reflection:"आज बिना फल की चिंता किए काम करो।"
},
{
shlok:"योगः कर्मसु कौशलम्",
meaning:"कर्म में कुशलता ही योग है।",
question:"योग का अर्थ क्या है?",
options:["ध्यान","कुशल कर्म","त्याग"],
answer:1,
reflection:"आज अपना काम उत्कृष्टता से करो।"
},
{
shlok:"न जायते म्रियते वा कदाचित्",
meaning:"आत्मा न जन्म लेती है, न मरती है।",
question:"आत्मा क्या है?",
options:["नश्वर","अमर","कमजोर"],
answer:1,
reflection:"आप शरीर नहीं, चेतना हैं।"
}
];

let index = 0;

function load(){
    let d = data[index];

    document.getElementById("shlok").innerText = d.shlok;
    document.getElementById("meaning").innerText = d.meaning;
    document.getElementById("question").innerText = d.question;
    document.getElementById("reflection").innerText = d.reflection;

    let opt = document.getElementById("options");
    opt.innerHTML = "";

    d.options.forEach((o,i)=>{
        let div = document.createElement("div");
        div.className = "option";
        div.innerText = o;

        div.onclick = ()=>{
            if(i === d.answer){
                document.getElementById("result").innerText = "✅ सही उत्तर!";
            }else{
                document.getElementById("result").innerText = "❌ फिर सोचो...";
            }
        };

        opt.appendChild(div);
    });

    document.getElementById("result").innerText="";
}

function next(){
    index++;
    if(index >= data.length) index = 0;
    load();
}

load();

</script>

</body>
</html>
