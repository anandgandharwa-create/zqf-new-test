<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meditation Guide</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#000,#021414);
color:#fff;
text-align:center;
}

/* Container */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* Card */
.card{
background:#0b1c1c;
padding:20px;
border-radius:15px;
margin-top:20px;
}

/* Title */
.title{
font-size:22px;
margin-bottom:10px;
}

/* Option */
.option{
background:#132c2c;
padding:14px;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.option.active{
border:2px solid #f5d06f;
background:#1f4444;
}

/* Button */
.btn{
background:#f5d06f;
color:#000;
padding:14px;
border-radius:25px;
margin-top:15px;
cursor:pointer;
font-size:16px;
}

/* Result */
.result{
margin-top:20px;
line-height:1.7;
color:#d6e2ff;
min-height:60px;
}

/* Back */
.back{
margin-top:20px;
color:#aaa;
cursor:pointer;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧘 Meditation Guide</div>
<div>आप क्या महसूस कर रहे हैं?</div>

<div class="card">

<div class="option" onclick="selectCase('stress',this)">
😣 तनाव / बेचैनी
</div>

<div class="option" onclick="selectCase('fear',this)">
😰 डर / घबराहट
</div>

<div class="option" onclick="selectCase('focus',this)">
🎯 ध्यान नहीं लग रहा
</div>

<div class="btn" onclick="startMeditation()">
Start Meditation
</div>

<div class="result" id="result"></div>

</div>

<div class="back" onclick="goBack()">⬅ Back</div>

</div>

<script>

/* Premium Check */
if(!localStorage.getItem("premium")){
alert("यह Premium Tool है");
window.location.href = "../premium.html";
}

let selected = "";

/* Select */
function selectCase(type,el){
selected = type;

document.querySelectorAll(".option").forEach(o=>{
o.classList.remove("active");
});

el.classList.add("active");
}

/* Random Helper */
function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* Meditation */
function startMeditation(){

if(!selected){
alert("कृपया एक स्थिति चुनें");
return;
}

let guides = {

stress:[
"आंखें बंद करें। 4 सेकंड सांस लें, 4 सेकंड रोकें, 4 सेकंड छोड़ें। इसे 5 बार करें।",
"धीरे-धीरे सांस लें और छोड़ें। हर सांस के साथ शरीर को ढीला छोड़ें।",
"अपने शरीर को महसूस करें और हर तनाव को छोड़ दें।"
],

fear:[
"अपने दिल पर ध्यान दें। धीरे-धीरे सांस लें और खुद से कहें: मैं सुरक्षित हूँ।",
"हर सांस के साथ डर को बाहर निकालें।",
"अपने शरीर को relax करें और वर्तमान में रहें।"
],

focus:[
"आंखें बंद करें और सिर्फ सांस पर ध्यान दें।",
"हर विचार को आने दें और जाने दें, उसे पकड़ें नहीं।",
"2 मिनट तक सिर्फ सांस को observe करें।"
]

};

document.getElementById("result").innerText = random(guides[selected]);

}

/* Back */
function goBack(){
window.location.href = "tools.html";
}

</script>

</body>
</html>
