<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karma Insight</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#000,#021414);
color:#fff;
text-align:center;
}

/* Container */
.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* Card */
.card{
background:#0b1c1c;
padding:20px;
border-radius:15px;
margin-top:20px;
}

/* Title */
.title{
font-size:22px;
margin-bottom:10px;
}

/* Option */
.option{
background:#132c2c;
padding:14px;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.option.active{
border:2px solid #f5d06f;
background:#1f4444;
}

/* Button */
.btn{
background:#f5d06f;
color:#000;
padding:14px;
border-radius:25px;
margin-top:15px;
cursor:pointer;
font-size:16px;
}

/* Result */
.result{
margin-top:20px;
line-height:1.7;
color:#d6e2ff;
min-height:60px;
}

/* Back */
.back{
margin-top:20px;
color:#aaa;
cursor:pointer;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🔥 Karma Insight</div>
<div>अपनी स्थिति चुनें</div>

<div class="card">

<div class="option" onclick="selectCase('good',this)">
😊 अच्छे कर्म कर रहा हूँ
</div>

<div class="option" onclick="selectCase('confused',this)">
🤔 समझ नहीं आ रहा सही क्या है
</div>

<div class="option" onclick="selectCase('negative',this)">
😓 गलत decisions हो रहे हैं
</div>

<div class="btn" onclick="calculate()">
Check Karma
</div>

<div class="result" id="result"></div>

</div>

<div class="back" onclick="goBack()">⬅ Back</div>

</div>

<script>

/* Premium Check */
if(!localStorage.getItem("premium")){
alert("यह Premium Tool है");
window.location.href = "../premium.html";
}

let selected = "";

/* Select */
function selectCase(type,el){
selected = type;

document.querySelectorAll(".option").forEach(o=>{
o.classList.remove("active");
});

el.classList.add("active");
}

/* Random Helper */
function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* Calculate */
function calculate(){

if(!selected){
alert("कृपया एक स्थिति चुनें");
return;
}

let outputs = {

good:[
"आपका कर्म सही दिशा में है 🔥",
"आप जो कर रहे हैं, उसका फल जरूर मिलेगा",
"अच्छे कर्म जारी रखें, यही मार्ग है"
],

confused:[
"शांत होकर निर्णय लें, कर्म स्पष्ट होगा",
"आपका इरादा सही है, बस clarity चाहिए",
"जल्दबाजी से बचें, सही रास्ता दिखेगा"
],

negative:[
"रुकें और सोचें — दिशा बदलने का समय है",
"हर कर्म सुधारा जा सकता है",
"आज से छोटे अच्छे कर्म शुरू करें"
]

};

document.getElementById("result").innerText = random(outputs[selected]);

}

/* Back */
function goBack(){
window.location.href = "tools.html";
}

</script>

</body>
</html>
