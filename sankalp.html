<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌿 आत्म-निरीक्षण</title>

<style>
body {
    font-family: sans-serif;
    background: #0a0f2c;
    color: white;
    text-align: center;
    padding: 20px;
}

.card {
    max-width: 500px;
    margin: auto;
    background: rgba(0, 100, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
}

h2 {
    color: gold;
}

select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    background: gold;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h2>🌿 आज का आत्म-निरीक्षण</h2>

<p>🙊 क्या मैंने आज निंदा की?</p>
<select>
<option>नहीं</option>
<option>थोड़ी</option>
<option>काफी</option>
<option>बहुत ज्यादा</option>
</select>

<p>😡 क्या मैंने गुस्सा किया?</p>
<select>
<option>नहीं</option>
<option>थोड़ा</option>
<option>काफी</option>
<option>बहुत ज्यादा</option>
</select>

<p>💤 क्या मैंने आलस्य किया?</p>
<select>
<option>नहीं</option>
<option>थोड़ा</option>
<option>काफी</option>
<option>बहुत ज्यादा</option>
</select>

<p>⏳ क्या मैंने समय बर्बाद किया?</p>
<select>
<option>नहीं</option>
<option>थोड़ा</option>
<option>काफी</option>
<option>बहुत ज्यादा</option>
</select>

<p>💪 क्या मैंने कुछ अच्छा किया?</p>
<select>
<option>हाँ, बहुत अच्छा</option>
<option>थोड़ा</option>
<option>नहीं</option>
</select>

<button onclick="alert('🌿 आपने आज का आत्म-निरीक्षण किया!')">
✔️ संकल्प सेव करें
</button>

</div>

</body>
</html>
